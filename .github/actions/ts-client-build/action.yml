name: 'TypeScript Client Build'
description: 'Builds TypeScript client from proto files'

inputs:
  proto-path:
    description: 'Path to proto files'
    required: true
  repo-path:
    description: 'Path to output directory for generated TypeScript files'
    required: true
  artifact-name:
    description: 'Name of the artifact to upload'
    required: true
  artifact-name-with-proto:
    description: 'Name of the artifact to upload with proto files'
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install protoc
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler
        
    - name: Install dependencies
      shell: bash
      run: |
        npm install --save-dev @protobuf-ts/plugin
        npm install @protobuf-ts/runtime

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.repo-path }}
      
    - name: Generate TypeScript files from proto
      shell: bash
      run: |
        protoc \
          -I ./ \
          --experimental_allow_proto3_optional \
          --plugin=protoc-gen-ts=./node_modules/.bin/protoc-gen-ts \
          --ts_out=${{ inputs.repo-path }} \
          ${{ inputs.proto-path }}
          
    - name: Upload generated files
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name-with-proto }}
        path: ${{ inputs.repo-path }}
        include-hidden-files: true
