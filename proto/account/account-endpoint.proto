syntax = "proto3";

package account;

option go_package = "/proto";

import "proto/error/error.proto";
import "proto/enums/accountType.proto";
import "google/protobuf/timestamp.proto";

service AccountEndpoint {
  // GetAccounts получение счетов по фильтрам
  rpc GetAccounts (GetAccountsRequest) returns (GetAccountsResponse) {}

  // CreateAccount создание счета
  rpc CreateAccount (CreateAccountRequest) returns (CreateAccountResponse) {}

  // UpdateAccount редактирование счета
  rpc UpdateAccount (UpdateAccountRequest) returns (UpdateAccountResponse) {}

  // DeleteAccount удаление счета
  rpc DeleteAccount (DeleteAccountRequest) returns (DeleteAccountResponse) {}
}

message AccountBudget {
  double amount = 1;           // Сумма бюджета
  uint32 daysOffset = 2;        // Смещение в днях
  double fixedSum = 3;         // Фиксированная сумма
  bool gradualFilling = 4;     // Постепенное пополнение
}

message Account {
  bytes id = 1;                                    // Идентификатор счета
  string name = 2;                                 // Название счета
  accountType.AccountType type = 3;               // Тип счета
  string currency = 4;                             // Валюта счета
  double remainder = 5;                            // Остаток средств на счету
  bool visible = 6;                                // Видимость счета
  bool accountingInCharts = 7;                     // Учитывать ли счет в графиках
  bool accountingInHeader = 8;                     // Будет ли счет учитываться в шапке
  bytes accountGroupID = 9;                        // Идентификатор группы счета
  bytes parentAccountID = 10;                      // Идентификатор родительского аккаунта
  bool isParent = 11;                              // Является ли счет родительским
  bytes iconID = 12;                               // Идентификатор иконки
  uint32 serialNumber = 13;                         // Порядковый номер счета
  bytes createdByUserID = 14;                      // Идентификатор пользователя, создавшего счет
  google.protobuf.Timestamp datetimeCreate = 15;  // Дата и время создания счета
  optional AccountBudget budget = 16;              // Бюджет
}

message GetAccountsRequest {
  string accessToken = 1;                        // Токен доступа
  repeated bytes accountGroupIDs = 2;            // Идентификаторы групп счетов
  optional bool accountingInCharts = 3;          // Учитывать ли счет в графиках
  optional bool accountingInHeader = 4;          // Учитывать ли счет в шапке
  optional google.protobuf.Timestamp dateFrom = 5;                  // Дата начала выборки
  optional google.protobuf.Timestamp dateTo = 6;                    // Дата конца выборки
  optional accountType.AccountType type = 7;    // Тип счета
  optional bool visible = 8;                     // Видимость счета
}

message GetAccountsResponse {
  optional error.Error error = 1; // Объект ошибки
  repeated Account accounts = 2;   // Список счетов
}

message CreateAccountRequest {
  string accessToken = 1;                      // Токен доступа
  bytes id = 2;                                // Идентификатор счета
  string name = 3;                             // Название счета
  accountType.AccountType type = 4;           // Тип счета
  string currency = 5;                         // Валюта счета
  bytes accountGroupID = 6;                    // Группа счета
  bool accountingInCharts = 7;                 // Учитывать ли счет в графиках
  bool accountingInHeader = 8;                 // Подсчет суммы счета в статистике
  bytes iconID = 9;                            // Идентификатор иконки
  bool isParent = 10;                           // Является ли счет родительским
  google.protobuf.Timestamp datetimeCreate = 11; // Дата создания счета
  optional bytes parentAccountID = 12;         // Идентификатор родительского счета
  optional double remainder = 13;              // Остаток средств на счету
  optional AccountBudget budget = 14;          // Бюджет
}

message CreateAccountResponse {
  optional error.Error error = 1;              // Объект ошибки
  optional uint32 serialNumber = 2;             // Порядковый номер счета
  optional bytes balancingAccountID = 3;       // Идентификатор балансировочного счета
  optional uint32 balancingAccountSerialNumber = 4; // Порядковый номер балансировочного счета
  optional bytes balancingTransactionID = 5;   // Идентификатор транзакции балансировки
}

message UpdateAccountRequest {
  string accessToken = 1;                     // Токен доступа
  bytes id = 2;                               // Идентификатор счета
  optional string name = 3;                   // Название счета
  optional bool accountingInCharts = 4;       // Будет ли счет учитываться в графиках
  optional bool accountingInHeader = 5;       // Будет ли счет учитываться в статистике
  optional string currency = 6;           // Валюта счета
  optional bytes iconID = 7;                  // Идентификатор иконки
  optional bytes parentAccountID = 8;         // Идентификатор родительского счета
  optional double remainder = 9;              // Остаток средств на счету
  optional uint32 serialNumber = 10;           // Порядковый номер счета
  optional bool visible = 11;                 // Видимость счета
  UpdateAccountBudgetRequest budget = 12;         // Месячный бюджет
}

message UpdateAccountBudgetRequest {
  optional double amount = 1;           // Сумма бюджета
  optional uint32 daysOffset = 2;        // Смещение в днях
  optional double fixedSum = 3;         // Фиксированная сумма
  optional bool gradualFilling = 4;     // Постепенное пополнение
}

message UpdateAccountResponse {
  optional error.Error error = 1; // Объект ошибки
}

message DeleteAccountRequest {
  string accessToken = 1; // Токен доступа
  bytes id = 2;           // Идентификатор счета
}

message DeleteAccountResponse {
  optional error.Error error = 1; // Объект ошибки
}
