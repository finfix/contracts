syntax = "proto3";

package error;

option go_package = "/proto";

message Error {
  int32 code = 1; // Код ошибки
  string message = 2; // Описание ошибки
  string systemMessage = 3; // Системное описание ошибки
  map<string, string> params = 4; // Дополнительная информация об ошибке
}

message OnlyError {
  optional Error error = 1; // Объект ошибки, если есть
}
